<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户分类小助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { opacity: 0.9; }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        .result.show { display: block; }
        .result-category {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .result-subcategory { color: #666; }
        .tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .tag {
            padding: 5px 12px;
            background: #e0e7ff;
            color: #667eea;
            border-radius: 20px;
            font-size: 12px;
        }
        .categories { margin-top: 40px; }
        .categories h3 { color: #333; margin-bottom: 15px; }
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .category-item {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 客户分类小助手</h1>
        <p class="subtitle">根据客户名称自动分类到：国防/科研/央国企/泛政府/其他</p>
        
        <div class="input-group">
            <input type="text" id="customerName" placeholder="输入客户名称，如：中国石油、清华大学" />
        </div>
        <button onclick="classify()">开始分类</button>
        
        <div class="result" id="result">
            <div class="result-category" id="category"></div>
            <div class="result-subcategory" id="subcategory"></div>
            <div class="tags" id="tags"></div>
        </div>
        
        <div class="categories">
            <h3>支持的分类</h3>
            <div class="category-grid">
                <div class="category-item">🛡️ 国防客户</div>
                <div class="category-item">🔬 科研客户</div>
                <div class="category-item">🏛️ 央国企客户</div>
                <div class="category-item">🏢 泛政府客户</div>
                <div class="category-item">📦 其他</div>
            </div>
        </div>
    </div>
    
    <script>
        const rules = {
            "国防客户": {
                "中央军委及直属机构": ["中央军委", "联合参谋部", "政治工作部", "后勤保障部", "装备发展部"],
                "各兵种机关及直属单位": ["陆军", "海军", "空军", "火箭军", "战略支援部队", "装备研究院"],
              "十大军工集团": ["中国核工业集团", "中国航天科技集团", "中国航天科工集团", "中国航空工业集团", "中国船舶集团", "中国兵器工业集团", "中国电子科技集团"]
},
"科研客户": {
"国家实验室": ["中关村实验室", "昌平实验室", "张江实验室"],
"高等院校": ["大学", "理工大学", "航空航天大学", "哈尔滨工业大学", "清华大学", "北京大学"],
"科研院所": ["中国科学院", "科研院所", "科学研究院"],
"医院": ["医院", "协和医院", "301医院"]
},
"央国企客户": {
"央企": ["国家电网", "中国石油", "中国石化", "中国海油", "中国移动", "中国电信", "中国建筑", "中国中铁", "中国电建"],
"金融类央国企": ["工商银行", "农业银行", "中国银行", "建设银行", "交通银行", "银行", "保险"],
"地方国企": ["高速集团", "机场集团", "城投", "交投", "能投", "国投"]
},
"泛政府客户": {
"各级党政机关": ["人民政府", "市委", "省委", "县政府", "市政府", "省政府", "公安局", "教育局", "财政局"],
"事业单位": ["博物院", "博物馆", "图书馆", "研究院"],
"国资平台公司": ["城投公司", "交投公司", "能投公司", "国投公司"]
}
};
       function classify() {
        const name = document.getElementById('customerName').value.trim();
        if (!name) return;
        
        let found = false;
        let category = "其他";
        let subcategory = "一般企业";
        let matchedKeywords = [];
        
        for (const [cat, subcats] of Object.entries(rules)) {
            for (const [sub, keywords] of Object.entries(subcats)) {
                for (const kw of keywords) {
                    if (name.includes(kw)) {
                        category = cat;
                        subcategory = sub;
                        matchedKeywords.push(kw);
                        found = true;
                        break;
                    }
                }
                if (found) break;
            }
            if (found) break;
        }
        
        document.getElementById('category').textContent = category;
        document.getElementById('subcategory').textContent = subcategory;
        
        const tagsContainer = document.getElementById('tags');
        tagsContainer.innerHTML = matchedKeywords.map(k => `<span class="tag">${k}</span>`).join('');
        
        document.getElementById('result').classList.add('show');
    }
    
    document.getElementById('customerName').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') classify();
    });
</script>
</body>
</html>
