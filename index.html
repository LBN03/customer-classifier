<body>
    <div class="container">

        <div class="upload-area" id="uploadArea"><p>📁 点击或拖拽 Excel 文件到此处上传</p><input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none"></div>
<div class="manual-input"><p style="margin-bottom: 10px; color: #666;">或手动输入客户名称（每行一个）：</p><textarea id="manualInput" placeholder="中国石油
清华大学
北京市政府
..."></textarea></div>
<div class="btn-group"><button onclick="processInput()" id="classifyBtn">开始分类</button><button onclick="downloadResult()" class="secondary" id="downloadBtn" disabled>导出结果</button><button onclick="clearAll()" class="secondary">清空</button></div>

</div>

let classificationResult = [];
function classify(name) {
if (!name || !name.trim()) return null;
name = name.trim();
let found = false;
let category = "其他";
let subcategory = "一般企业";
let matchedKeywords = [];
for (const [cat, subcats] of Object.entries(rules)) {
for (const [sub, keywords] of Object.entries(subcats)) {
for (const kw of keywords) {
if (name.includes(kw)) { category = cat; subcategory = sub; matchedKeywords.push(kw); found = true; break; }
}
if (found) break;
}
if (found) break;
}
return { name, category, subcategory, keywords: matchedKeywords };
}
