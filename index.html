<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户分类小助手</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 900px; width: 100%; margin: 0 auto; padding: 40px; }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .upload-area { border: 2px dashed #ccc; border-radius: 10px; padding: 30px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .upload-area:hover { border-color: #667eea; }
        .manual-input { margin-bottom: 20px; }
        textarea { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; resize: vertical; min-height: 80px; }
        textarea:focus { outline: none; border-color: #667eea; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 12px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600; }
        button:hover { opacity: 0.9; }
        button.secondary { background: #6c757d; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        .result-table th, .result-table td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .result-table th { background: #f8f9fa; font-weight: 600; color: #333; }
        .result-table tr:hover { background: #f8f9fa; }
        .category-tag { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 12px; font-weight: 500; }
        .category-国防 { background: #ffe0e0; color: #d32f2f; }
        .category-科研 { background: #e0f0ff; color: #1976d2; }
        .category-央国企 { background: #fff3e0; color: #f57c00; }
        .category-泛政府 { background: #e8f5e9; color: #388e3c; }
        .category-其他 { background: #f5f5f5; color: #666; }
        .stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-item { background: #f8f9fa; padding: 15px 20px; border-radius: 10px; text-align: center; }
        .stat-number { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; }
        .hidden { display: none; }
        .categories { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
        .categories h3 { color: #333; margin-bottom: 15px; font-size: 16px; }
        .category-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        .category-item { padding: 8px 16px; background: #f5f5f5; border-radius: 20px; font-size: 12px; color: #666; }
        .info-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: #856404; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 客户分类小助手</h1>
        <p class="subtitle">支持 Excel 导入或手动输入，自动分类：国防/科研/央国企/泛政府/其他</p>
        <div class="info-box">📋 Excel 格式：客户名称在第一列，支持 .xlsx 和 .xls</div>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p>📁 点击选择 Excel 文件上传</p>
        </div>
        <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(this.files[0])" style="display:none">
<div class="manual-input"><p style="margin-bottom: 10px; color: #666;">或手动输入客户名称（每行一个）：</p><textarea id="manualInput" placeholder="中国石油
清华大学
北京市政府"></textarea></div>
<div class="btn-group"><button onclick="processInput()">开始分类</button><button onclick="downloadResult()" class="secondary" id="downloadBtn" disabled>导出CSV</button><button onclick="clearAll()" class="secondary">清空</button></div>
<div class="stats hidden" id="stats"></div>
<div id="resultContainer" class="hidden"><h3 style="margin-bottom: 15px;">分类结果</h3><table class="result-table"><thead><tr><th>序号</th><th>客户名称</th><th>一级分类</th><th>二级分类</th><th>匹配关键词</th></tr></thead><tbody id="resultBody"></tbody></table></div>
<div class="categories"><h3>支持的分类</h3><div class="category-grid"><div class="category-item">🛡️ 国防客户</div><div class="category-item">🔬 科研客户</div><div class="category-item">🏛️ 央国企客户</div><div class="category-item">🏢 泛政府客户</div><div class="category-item">📦 其他</div></div></div>
</div>
<script>
const rules = {
"国防客户": { "中央军委及直属机构": ["中央军委", "联合参谋部", "政治工作部", "后勤保障部", "装备发展部"], "各兵种机关": ["陆军", "海军", "空军", "火箭军", "战略支援部队"], "十大军工集团": ["中国核工业集团", "中核集团", "中国航天科技集团", "中国航天科工集团", "中国航空工业集团", "中国船舶集团", "中国兵器工业集团", "中国电子科技集团", "中国电科"] },
"科研客户": { "高等院校": ["大学", "清华大学", "北京大学", "哈尔滨工业大学", "理工大学", "航空航天大学"], "科研院所": ["中国科学院", "研究院", "科研院所"], "医院": ["医院", "协和医院", "301医院"] },
"央国企客户": { "央企": ["国家电网", "中国石油", "中国石化", "中国移动", "中国电信", "中国建筑", "中国中铁"], "金融类": ["工商银行", "农业银行", "中国银行", "建设银行", "银行", "保险"], "地方国企": ["城投", "交投", "能投", "国投", "高速集团", "机场集团"] },
"泛政府客户": { "党政机关": ["人民政府", "市委", "省委", "县政府", "市政府", "省政府", "公安局", "教育局", "财政局"], "事业单位": ["博物院", "博物馆", "图书馆", "研究院"] }
};
let classificationResult = [];
function classify(name) {
if (!name || !name.trim()) return null;
name = name.trim();
let category = "其他";
let subcategory = "一般企业";
let matchedKeywords = [];
for (const [cat, subcats] of Object.entries(rules)) {
for (const [sub, keywords] of Object.entries(subcats)) {
for (const kw of keywords) {
if (name.includes(kw)) { category = cat; subcategory = sub; matchedKeywords.push(kw); break; }
}
if (matchedKeywords.length > 0) break;
}
if (matchedKeywords.length > 0) break;
}
return { name, category, subcategory, keywords: matchedKeywords };
}
function handleFile(file) {
if (!file) return;
const reader = new FileReader();
reader.onload = function(e) {
try {
const data = new Uint8Array(e.target.result);
const workbook = XLSX.read(data, { type: 'array' });
const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
const names = jsonData.map(row => row[0]).filter(n => n && typeof n === 'string');
if (names.length === 0) { alert('未找到客户名称'); return; }
classificationResult = names.map((name, i) => ({ ...classify(name), index: i + 1 }));
displayResult();
} catch (err) { alert('文件解析失败'); }
};
reader.readAsArrayBuffer(file);
}
function processInput() {
const text = document.getElementById('manualInput').value;
const names = text.split('\n').map(s => s.trim()).filter(s => s);
if (names.length === 0) { alert('请输入客户名称'); return; }
classificationResult = names.map((name, i) => ({ ...classify(name), index: i + 1 }));
displayResult();
}
function displayResult() {
const tbody = document.getElementById('resultBody');
tbody.innerHTML = '';
const stats = {};
classificationResult.forEach(r => { stats[r.category] = (stats[r.category] || 0) + 1; });
document.getElementById('stats').innerHTML = Object.entries(stats).map(([cat, c]) => <div class="stat-item"><div class="stat-number">${c}</div><div class="stat-label">${cat}</div></div>).join('');
document.getElementById('stats').classList.remove('hidden');
classificationResult.forEach(r => {
const row = document.createElement('tr');
row.innerHTML = <td>${r.index}</td><td>${r.name}</td><td><span class="category-tag category-${r.category.replace('客户','')}">${r.category}</span></td><td>${r.subcategory}</td><td>${r.keywords.join(', ') || '-'}</td>;
tbody.appendChild(row);
});
document.getElementById('resultContainer').classList.remove('hidden');
document.getElementById('downloadBtn').disabled = false;
}
function downloadResult() {
if (classificationResult.length === 0) return;
let csv = '序号,客户名称,一级分类,二级分类,匹配关键词\n';
classificationResult.forEach(r => csv += ${r.index},"${r.name}","${r.category}","${r.subcategory}","${r.keywords.join(', ')}"\n);
const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
const a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = '客户分类结果.csv';
a.click();
}
function clearAll() {
document.getElementById('manualInput').value = '';
document.getElementById('fileInput').value = '';
classificationResult = [];
document.getElementById('resultBody').innerHTML = '';
document.getElementById('stats').classList.add('hidden');
document.getElementById('resultContainer').classList.add('hidden');
document.getElementById('downloadBtn').disabled = true;
}
</script>
</body>
</html>
